version: v2

managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/company/service-api/gen/go/{{.Dir}}
    - file_option: java_package
      value: com.company.serviceapi.{{.Dir}}

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.0
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/protocolbuffers/python:v28.2
    out: gen/python

  - remote: buf.build/grpc/python:v1.66.0
    out: gen/python

  - remote: buf.build/protocolbuffers/java:v28.2
    out: gen/java

  - remote: buf.build/grpc/java:v1.66.0
    out: gen/java

  - remote: buf.build/community/ts-proto:v2.2.0
    out: gen/typescript
    opt:
      - outputServices=grpc-js
      - outputClientImpl=grpc-js
      - useExactTypes=false